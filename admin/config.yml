backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

locale: 'kk'

collections:
  - name: "settings"
    label: "Сайт баптаулары"
    files:
      - name: "general"
        label: "Жалпы мәліметтер"
        file: "_data/content.json"
        format: json
        fields:
          - label: "Байланыс"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Мекенжай", name: "address", widget: "string" }
              - { label: "Телефон", name: "phone", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
          - label: "Қор статистикасы"
            name: "stats"
            widget: "object"
            fields:
              - { label: "Мешіт саны", name: "mosques", widget: "string" }
              - { label: "Облыстық өкілдік", name: "regions", widget: "string" }
              - { label: "Тіркелген уақып", name: "waqfs", widget: "string" }
              - { label: "Жыл бойғы қаражат", name: "funds", widget: "string" }
          - label: "Қор қазынасы"
            name: "treasury"
            widget: "object"
            fields:
              - { label: "Жалпы сома", name: "total", widget: "string" }
              - { label: "Өсім", name: "growth", widget: "string" }
              - { label: "Мешіт құрылысы %", name: "construction", widget: "string" }
              - { label: "Білім беру %", name: "education", widget: "string" }
              - { label: "Қайырымдылық %", name: "charity", widget: "string" }
              - { label: "Имамдар қоры %", name: "imams", widget: "string" }
              - { label: "Резерв %", name: "reserve", widget: "string" }
          - label: "BCC Bank серіктес"
            name: "partner"
            widget: "object"
            fields:
              - { label: "Уақып-шоттарда", name: "accounts", widget: "string" }

  - name: "projects"
    label: "Жобалар"
    files:
      - name: "projects_list"
        label: "Жобалар тізімі"
        file: "_data/projects.json"
        format: json
        fields:
          - label: "Жобалар"
            name: "items"
            widget: "list"
            fields:
              - { label: "Тақырып (тег)", name: "tag", widget: "string" }
              - { label: "Атауы", name: "title", widget: "string" }
              - { label: "Сипаттама", name: "description", widget: "text" }
              - { label: "Прогресс (%)", name: "progress", widget: "number", value_type: "int", min: 0, max: 100 }
              - { label: "Сол жақ мета", name: "meta_left", widget: "string" }
              - { label: "Оң жақ мета", name: "meta_right", widget: "string" }
              - { label: "Фотосурет", name: "image", widget: "image", required: false, default: "" }

  - name: "news"
    label: "Жаңалықтар"
    files:
      - name: "news_list"
        label: "Жаңалықтар тізімі"
        file: "_data/news.json"
        format: json
        fields:
          - label: "Жаңалықтар"
            name: "items"
            widget: "list"
            fields:
              - { label: "Күні", name: "date", widget: "string" }
              - { label: "Басты жаңалық па?", name: "featured", widget: "boolean", default: false }
              - { label: "Санат", name: "category", widget: "string", required: false, default: "" }
              - { label: "Тақырыбы", name: "title", widget: "string" }
              - { label: "Қысқаша мәтін", name: "description", widget: "text" }
              - { label: "Фотосурет", name: "image", widget: "image", required: false, default: "" }
